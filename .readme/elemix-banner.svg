<svg width="1280" height="300" viewBox="0 0 1280 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="elemix - Reactive Elements">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1122"/>
      <stop offset="1" stop-color="#070b16"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0" r="0.9">
      <stop offset="0" stop-color="#4ca8ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#4ca8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4CA8FF"/>
      <stop offset="1" stop-color="#1E4FD8"/>
    </linearGradient>

    <!-- 56px compiler grid + edge-fade mask -->
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0.5H0M0.5 0V56" fill="none" stroke="#4ca8ff" stroke-width="1" stroke-opacity="0.08"/>
    </pattern>
    <radialGradient id="gridFade" gradientUnits="userSpaceOnUse" cx="520" cy="150" r="640" gradientTransform="matrix(1 0 0 0.34 0 99)">
      <stop offset="0.4" stop-color="#fff"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <mask id="gridMask">
      <rect width="1280" height="300" fill="url(#gridFade)"/>
    </mask>

    <!-- static scan lines -->
    <linearGradient id="scanX" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4ca8ff" stop-opacity="0"/>
      <stop offset="0.72" stop-color="#4ca8ff" stop-opacity="0.5"/>
      <stop offset="0.95" stop-color="#4ca8ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4ca8ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scanY" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ca8ff" stop-opacity="0"/>
      <stop offset="0.72" stop-color="#4ca8ff" stop-opacity="0.4"/>
      <stop offset="0.95" stop-color="#4ca8ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#4ca8ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="scanGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <rect width="1280" height="300" rx="18" fill="url(#bg)"/>
  <rect width="1280" height="300" fill="url(#grid)" mask="url(#gridMask)"/>
  <rect width="1280" height="300" rx="18" fill="url(#glow)"/>

  <!-- static scan lines crossing bottom-right (64px off each edge) -->
  <rect x="0" y="234.5" width="1280" height="3" fill="url(#scanX)" opacity="0.5" filter="url(#scanGlow)"/>
  <rect x="0" y="235.25" width="1280" height="1.5" fill="url(#scanX)"/>
  <rect x="1214.5" y="0" width="3" height="300" fill="url(#scanY)" opacity="0.5" filter="url(#scanGlow)"/>
  <rect x="1215.25" y="0" width="1.5" height="300" fill="url(#scanY)"/>

  <!-- elemix bolt-and-rings mark -->
